services:
  # ═══════════════════════════════════════════
  # LLM Engine — Ollama (ROCm / AMD W7900)
  # ═══════════════════════════════════════════
  ollama:
    image: ollama/ollama:rocm
    container_name: ollama-w7900
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    volumes:
      - ./ollama_data:/root/.ollama
    environment:
      - OLLAMA_NUM_PARALLEL=4
      - OLLAMA_MAX_LOADED_MODELS=2
      - OLLAMA_CONTEXT_LENGTH=8192
    ports:
      - "11434:11434"        # exposed for local debugging; Tailscale protects the host
    restart: always

  # ═══════════════════════════════════════════
  # API Gateway & Project Router — LiteLLM
  # ═══════════════════════════════════════════
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm-gateway
    ports:
      - "4000:4000"
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
    command: ["--config", "/app/config.yaml"]
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/postgres
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    depends_on:
      db:
        condition: service_started
    restart: always

  # ═══════════════════════════════════════════
  # Project Memory — Mem0 API (custom build)
  # Uses Ollama for LLM + Q ant for vectors
  # ═══════════════════════════════════════════
  mem0:
    build: ./mem0-api
    container_name: mem0-memory
    ports:
      - "8080:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - MEM0_LLM_MODEL=deepseek-r1:32b
      - MEM0_EMBED_MODEL=nomic-embed-text
    depends_on:
      qdrant:
        condition: service_started
      ollama:
        condition: service_started
    restart: always

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant-vectordb
    volumes:
      - ./qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"          # internal; useful for debug
    restart: always

  # ═══════════════════════════════════════════
  # Postgres — LiteLLM persistence
  # ═══════════════════════════════════════════
  db:
    image: postgres:16
    container_name: litellm-postgres
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    restart: always

  # ═══════════════════════════════════════════
  # Redis — optional cache / rate-limit backend
  # ═══════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: redis-cache
    restart: always

  # ═══════════════════════════════════════════
  # Speech-to-Text — Speaches (Whisper + Kokoro)
  # OpenAI-compatible STT/TTS server
  # Serves: Whisper Large-v3 (STT) + Kokoro-82M (TTS)
  # ═══════════════════════════════════════════
  speaches:
    image: ghcr.io/speaches-ai/speaches:latest
    container_name: speaches-stt-tts
    ports:
      - "8000:8000"
    volumes:
      - ./models/whisper-turbo:/root/.cache/huggingface/hub/whisper-turbo
      - ./models/kokoro:/root/.cache/huggingface/hub/kokoro
    environment:
      - WHISPER__MODEL=Systran/faster-whisper-large-v3
      - KOKORO__ENABLED=true
    restart: always

  # ═══════════════════════════════════════════
  # Text-to-Speech — Fish Speech V1.5
  # Expressive, realistic voice synthesis
  # ═══════════════════════════════════════════
  fish-speech:
    image: fishaudio/fish-speech:latest
    container_name: fish-speech-tts
    ports:
      - "8001:8080"
    volumes:
      - ./models/fish-speech:/root/.cache/fish-speech
    restart: always

  # ═══════════════════════════════════════════
  # Text-to-Speech — XTTS-v2 (Coqui)
  # Multilingual voice cloning (J.A.R.V.I.S.)
  # ═══════════════════════════════════════════
  xtts:
    image: ghcr.io/coqui-ai/xtts-streaming-server:latest
    container_name: xtts-v2-tts
    ports:
      - "8002:80"
    volumes:
      - ./models/xtts-v2:/app/tts_models
    environment:
      - COQUI_TOS_AGREED=1
    restart: always

  # ═══════════════════════════════════════════
  # Image / Video Generation — ComfyUI
  # FLUX.1-schnell (FP8, 17 GB) — image gen
  # CogVideoX-2b  (14 GB) — video gen
  # ═══════════════════════════════════════════
  comfyui:
    image: ghcr.io/ai-dock/comfyui:rocm-latest
    container_name: comfyui-imggen
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    ports:
      - "8188:8188"
    volumes:
      - ./models/flux-schnell:/workspace/ComfyUI/models/checkpoints/flux-schnell
      - ./models/cogvideox-2b:/workspace/ComfyUI/models/checkpoints/cogvideox-2b
      - ./comfyui_data:/workspace/ComfyUI/output
    environment:
      - CLI_ARGS=--listen
    restart: unless-stopped
