# ╔══════════════════════════════════════════════════════════════╗
# ║  Cognitive Silo — Lean LiteLLM Gateway Configuration       ║
# ║  Only raw models and routing logic. Zero system prompts.   ║
# ║  Personas are injected at the client level via system msg. ║
# ╚══════════════════════════════════════════════════════════════╝

model_list:
  # ── Base Hardware Models (AMD Radeon PRO W7900, 48GB VRAM) ──

  - model_name: deepseek-r1-32b
    litellm_params:
      model: ollama/deepseek-r1:32b
      api_base: "http://ollama:11434"

  - model_name: deepseek-v2-16b
    litellm_params:
      model: ollama/deepseek-v2:16b
      api_base: "http://ollama:11434"

  - model_name: deepseek-r1-70b
    litellm_params:
      model: ollama/deepseek-r1:70b
      api_base: "http://ollama:11434"

  - model_name: llama3-8b
    litellm_params:
      model: ollama/llama3.3:latest
      api_base: "http://ollama:11434"

  # ── Embeddings ──
  - model_name: nomic-embed-text
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: "http://ollama:11434"

  # ── Speech-to-Text (Speaches — OpenAI-compatible) ──
  - model_name: whisper-turbo
    litellm_params:
      model: openai/deepdml/faster-whisper-large-v3-turbo-ct2
      api_base: "http://speaches:8000/v1"
      api_key: "not-needed"

  # ── Text-to-Speech (Speaches — OpenAI-compatible) ──
  - model_name: kokoro-tts
    litellm_params:
      model: openai/speaches-ai/Kokoro-82M-v1.0-ONNX
      api_base: "http://speaches:8000/v1"
      api_key: "not-needed"

  # ── Cloud Overflow ──
  - model_name: github-fallback
    litellm_params:
      model: openai/gpt-4o
      api_key: "os.environ/GITHUB_TOKEN"
      api_base: "https://models.inference.ai.azure.com"

# ── General settings ──
general_settings:
  master_key: "os.environ/LITELLM_MASTER_KEY"
  database_url: "os.environ/DATABASE_URL"

litellm_settings:
  drop_params: true
  request_timeout: 120
  num_retries: 2
  fallbacks:
    - deepseek-r1-32b: [github-fallback]
    - deepseek-v2-16b: [github-fallback]
    - deepseek-r1-70b: [github-fallback]
    - llama3-8b: [github-fallback]
